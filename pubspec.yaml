name: phishguard_ai
description: Enterprise AI-powered phishing detection and learning platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Code Generation / Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Security
  local_auth: ^2.3.0
  flutter_jailbreak_detection: ^1.10.0
  crypto: ^3.0.6

  # UI
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3
  lottie: ^3.3.1
  flutter_svg: ^2.0.16

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  logger: ^2.5.0
  connectivity_plus: ^6.1.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  equatable: ^2.0.7
  dartz: ^0.10.1
  retry: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
